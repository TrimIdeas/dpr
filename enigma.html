<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Full Enigma Machine</title>
<style>
  body { font-family: Arial; text-align: center; background: #111827; color: #fef3c7; }
  textarea { width: 80%; height: 100px; margin: 10px; font-size: 16px; }
  .rotor { display: inline-block; margin: 10px; cursor: pointer; font-size: 20px; }
  #output { margin-top: 20px; font-size: 20px; color: #34d399; }
</style>
</head>
<body>

<h1>🕹️ Full Enigma Machine</h1>

<div class="rotor" id="rotor1">0</div>
<div class="rotor" id="rotor2">0</div>
<div class="rotor" id="rotor3">0</div>

<br>

<textarea id="input" placeholder="Type anything... letters, numbers, symbols!"></textarea><br>
<button onclick="run()">🔄 Encrypt / Decrypt</button>

<div id="output"></div>

<script>
// BIG character set
const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 !@#$%^&*()_+-=[]{};':\",.<>?/|";
const N = chars.length;

// Generate random rotor wiring
function shuffle(str) {
  return str.split('').sort(() => Math.random() - 0.5).join('');
}

// Fixed rotors (so friends can decode)
const rotorWiring = [
  "QwE1ZxCvBnM!aS2dF3gHjK4lP0oIuYtR5eW6rT7yU8iO9pA@sDfGhJkLzXcVbNm?.,",
  shuffle(chars),
  shuffle(chars)
];

// Reflector (must map pairs)
let reflector = chars.split('');
for (let i = 0; i < N; i += 2) {
  let j = (i + 1) % N;
  [reflector[i], reflector[j]] = [reflector[j], reflector[i]];
}
reflector = reflector.join('');

let r1 = document.getElementById("rotor1");
let r2 = document.getElementById("rotor2");
let r3 = document.getElementById("rotor3");

let r1pos = 0, r2pos = 0, r3pos = 0;

// Click to rotate
r1.onclick = () => { r1pos = (r1pos + 1) % N; r1.textContent = r1pos; };
r2.onclick = () => { r2pos = (r2pos + 1) % N; r2.textContent = r2pos; };
r3.onclick = () => { r3pos = (r3pos + 1) % N; r3.textContent = r3pos; };

function enigma(text) {
  let output = "";
  let a = r1pos, b = r2pos, c = r3pos;

  for (let ch of text) {
    let idx = chars.indexOf(ch);
    if (idx === -1) { output += ch; continue; }

    // Forward
    idx = (idx + a) % N;
    ch = rotorWiring[0][idx];
    idx = (chars.indexOf(ch) + b) % N;
    ch = rotorWiring[1][idx];
    idx = (chars.indexOf(ch) + c) % N;
    ch = rotorWiring[2][idx];

    // Reflect
    idx = reflector.indexOf(ch);
    ch = chars[idx];

    // Backward
    idx = rotorWiring[2].indexOf(ch);
    ch = chars[(idx - c + N) % N];
    idx = rotorWiring[1].indexOf(ch);
    ch = chars[(idx - b + N) % N];
    idx = rotorWiring[0].indexOf(ch);
    ch = chars[(idx - a + N) % N];

    output += ch;

    // Rotate
    a = (a + 1) % N;
    if (a === 0) b = (b + 1) % N;
    if (a === 0 && b === 0) c = (c + 1) % N;
  }

  return output;
}

function run() {
  let text = document.getElementById("input").value;
  document.getElementById("output").innerText = enigma(text);
}
</script>

<p>Click rotors to set your key. Same settings = decrypts correctly!</p>

</body>
</html>
